name: Build & Release ANABOK CLEANER

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    name: Build APK (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Build APK release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 7

  build-windows:
    name: Build EXE (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Windows platform files
        run: flutter create . --platforms windows --project-name anabok_cleaner

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "anabok_cleaner_windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: anabok_cleaner_windows.zip
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: artifacts/apk

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "ANABOK CLEANER - build ${{ steps.sha.outputs.short }}"
          body: |
            Release automatique depuis le commit `${{ github.sha }}`.

            **Fichiers disponibles :**
            - `app-arm64-v8a-release.apk` -> Telephones Android recents (64-bit)
            - `app-armeabi-v7a-release.apk` -> Anciens telephones Android (32-bit)
            - `anabok_cleaner_windows.zip` -> Windows (extraire et lancer .exe)
          prerelease: false
          files: |
            artifacts/apk/*.apk
            artifacts/windows/anabok_cleaner_windows.zip
